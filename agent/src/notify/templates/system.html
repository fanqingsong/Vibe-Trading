{% extends "base.html" %}
{# Generic system notification: mandate committed, channel halted, test email.
   Renders body_lines as an unordered list. `kind` controls tone. #}
{% block content %}
  <p>{{ heading }}.</p>
  <ul>
    {% for line in body_lines %}
      <li>{{ line }}</li>
    {% endfor %}
  </ul>
{% endblock %}
